<title>Evimiz GEO Platform v2</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:      #0b0f14;
    --surface: #11161d;
    --card:    #161d27;
    --border:  rgba(77,163,255,0.15);
    --accent:  #4da3ff;
    --accent2: #7C6FFF;
    --green:   #3ecf8e;
    --text:    #f1f5f9;
    --muted:   #7a8a9e;
    --font:    -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  html, body { height: 100%; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Topbar ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 16px;
  }

  .logo {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    flex-shrink: 0;
  }
  .logo span { color: #e84040; }

  .controls { display: flex; gap: 10px; align-items: center; }

  select {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    appearance: none;
    -webkit-appearance: none;
    outline: none;
    transition: border-color 0.2s;
  }
  select:hover { border-color: var(--accent); }
  select:focus { border-color: var(--accent); }

  .progress-wrap {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
    max-width: 200px;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .slide-counter {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    min-width: 48px;
    text-align: center;
  }

  /* ── Slides ── */
  #slides-viewport {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 56px 80px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.45s ease, transform 0.45s ease;
    transform: translateX(40px);
  }
  .slide.active {
    opacity: 1;
    pointer-events: all;
    transform: translateX(0);
  }
  .slide.exit {
    opacity: 0;
    transform: translateX(-40px);
    pointer-events: none;
  }

  /* ── Slide content ── */
  .s-tag {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(77,163,255,0.35);
    background: rgba(77,163,255,0.08);
    padding: 5px 16px;
    border-radius: 50px;
    margin-bottom: 22px;
    align-self: flex-start;
  }

  .s-h1 {
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 800;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
    max-width: 680px;
  }
  .s-h1 .hl {
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .s-body {
    font-size: clamp(1rem, 1.8vw, 1.2rem);
    color: var(--muted);
    line-height: 1.65;
    max-width: 580px;
    margin-bottom: 32px;
  }

  /* Cards */
  .s-cards {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .s-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 22px;
    min-width: 160px;
    flex: 1;
  }
  .s-card-icon { font-size: 1.4rem; margin-bottom: 8px; }
  .s-card-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 4px; }
  .s-card-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.4; }

  /* Stat row */
  .s-stats {
    display: flex;
    gap: 40px;
    margin-top: 28px;
    flex-wrap: wrap;
  }
  .s-stat-val {
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }
  .s-stat-lbl { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

  /* Tag row */
  .s-pills {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 20px;
  }
  .s-pill {
    font-size: 0.8rem;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 50px;
    border: 1px solid;
  }
  .s-pill.blue   { color: var(--accent);  border-color: rgba(77,163,255,0.4);  background: rgba(77,163,255,0.08); }
  .s-pill.purple { color: var(--accent2); border-color: rgba(124,111,255,0.4); background: rgba(124,111,255,0.08); }
  .s-pill.green  { color: var(--green);   border-color: rgba(62,207,142,0.4);  background: rgba(62,207,142,0.08); }

  /* Cover gradient bg */
  .slide-cover {
    background:
      radial-gradient(ellipse at 20% 50%, rgba(77,163,255,0.12) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 30%, rgba(124,111,255,0.12) 0%, transparent 55%),
      var(--bg);
  }

  /* ── Bottombar ── */
  .bottombar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .nav-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 20px;
    border-radius: 9px;
    cursor: pointer;
    font-size: 1rem;
    font-family: var(--font);
    transition: all 0.2s;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  .dots { display: flex; gap: 6px; align-items: center; }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    cursor: pointer;
    transition: all 0.3s;
    opacity: 0.5;
  }
  .dot.active { background: var(--accent); width: 18px; border-radius: 3px; opacity: 1; }
</style>

function buildSlideHTML(s) {
  let inner = '';

  if (s.tag)   inner += `<div class="s-tag">${s.tag}</div>`;
  if (s.title) inner += `<h1 class="s-h1">${s.title}</h1>`;
  if (s.body)  inner += `<p class="s-body">${s.body}</p>`;

  if (s.stats) {
    inner += `<div class="s-stats">` +
      s.stats.map(st => `<div><div class="s-stat-val">${st.val}</div><div class="s-stat-lbl">${st.lbl}</div></div>`).join('') +
      `</div>`;
  }

  if (s.cards) {
    inner += `<div class="s-cards">` +
      s.cards.map(c => `
        <div class="s-card">
          <div class="s-card-icon">${c.icon}</div>
          <div class="s-card-name">${c.name}</div>
          <div class="s-card-desc">${c.desc}</div>
        </div>`).join('') +
      `</div>`;
  }

  if (s.pills) {
    inner += `<div class="s-pills">` +
      s.pills.map(p => `<div class="s-pill ${p.cls}">${p.text}</div>`).join('') +
      `</div>`;
  }

  return inner;
}

function renderSlides() {
  const seg  = document.getElementById('segment').value;
  const lang = document.getElementById('lang').value;
  const data = content[seg][lang];
  const vp   = document.getElementById('slides-viewport');

  vp.innerHTML = '';
  slides = [];

  data.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '') + (i === 0 ? ' slide-cover' : '');
    div.innerHTML = buildSlideHTML(s);
    vp.appendChild(div);
    slides.push(div);
  });

  current = 0;
  updateUI();
}

function goTo(idx) {
  if (idx < 0 || idx >= slides.length) return;
  const dir = idx > current ? 1 : -1;

  slides[current].classList.remove('active');
  slides[current].classList.add('exit');
  setTimeout(() => slides[current] && slides[current].classList.remove('exit'), 500);

  const prev = current;
  current = idx;

  slides[current].style.transform = `translateX(${dir * 40}px)`;
  slides[current].style.opacity = '0';

  requestAnimationFrame(() => requestAnimationFrame(() => {
    slides[current].style.transition = 'opacity 0.45s ease, transform 0.45s ease';
    slides[current].style.transform = 'translateX(0)';
    slides[current].style.opacity   = '1';
    slides[current].classList.add('active');
  }));

  setTimeout(() => {
    if (slides[prev]) {
      slides[prev].style.transition = '';
      slides[prev].style.transform  = '';
      slides[prev].style.opacity    = '';
    }
  }, 500);

  updateUI();
}

function go(dir) { goTo(current + dir); }

function updateUI() {
  const total = slides.length;
  document.getElementById('slide-counter').textContent = `${current + 1} / ${total}`;
  document.getElementById('progress-bar').style.width = `${(current + 1) / total * 100}%`;
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === total - 1;

  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === current ? ' active' : '');
    d.onclick = () => goTo(i);
    dotsEl.appendChild(d);
  });
}

document.getElementById('segment').addEventListener('change', renderSlides);
document.getElementById('lang').addEventListener('change', renderSlides);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(-1);
});

renderSlides();
</script>
</body>
</html>
