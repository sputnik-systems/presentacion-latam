<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Evimiz GEO Platform v2</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:      #0b0f14;
    --surface: #11161d;
    --card:    #161d27;
    --border:  rgba(77,163,255,0.15);
    --accent:  #4da3ff;
    --accent2: #7C6FFF;
    --green:   #3ecf8e;
    --text:    #f1f5f9;
    --muted:   #7a8a9e;
    --font:    -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  html, body { height: 100%; }

  body {
    font-family: var(--font);
    background: radial-gradient(circle at 20% 20%, #1e293b, #020617);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Topbar ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 16px;
  }

  .logo {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    flex-shrink: 0;
  }
  .logo span { color: #e84040; }

  .controls { display: flex; gap: 10px; align-items: center; }

  select {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    appearance: none;
    -webkit-appearance: none;
    outline: none;
    transition: border-color 0.2s;
  }
  select:hover { border-color: var(--accent); }
  select:focus { border-color: var(--accent); }

  .progress-wrap {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
    max-width: 200px;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .slide-counter {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    min-width: 48px;
    text-align: center;
  }

  /* ── Slides ── */
  #slides-viewport {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    justify-content: center;
  }

  .slide {
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    width: 100%;
    max-width: 900px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 100px 40px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease, transform 0.5s ease;
    z-index: 0;
    backdrop-filter: blur(6px);
  }
  .slide.active {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: all;
    z-index: 1;
  }

  /* ── Slide content ── */
  .s-tag {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(77,163,255,0.35);
    background: rgba(77,163,255,0.08);
    padding: 5px 16px;
    border-radius: 50px;
    margin-bottom: 22px;
  }

  .s-h1 {
    font-size: 52px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
    max-width: 700px;
  }
  .s-h1 .hl {
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .s-body {
    font-size: 20px;
    opacity: 0.7;
    line-height: 1.65;
    max-width: 600px;
    margin-bottom: 32px;
  }

  /* Cards */
  .s-cards {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .s-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 22px;
    min-width: 160px;
    flex: 1;
  }
  .s-card-icon { font-size: 1.4rem; margin-bottom: 8px; }
  .s-card-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 4px; }
  .s-card-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.4; }

  /* Stat row */
  .s-stats {
    display: flex;
    gap: 40px;
    margin-top: 28px;
    flex-wrap: wrap;
  }
  .s-stat-val {
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }
  .s-stat-lbl { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

  /* Tag row */
  .s-pills {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 20px;
  }
  .s-pill {
    font-size: 0.8rem;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 50px;
    border: 1px solid;
  }
  .s-pill.blue   { color: var(--accent);  border-color: rgba(77,163,255,0.4);  background: rgba(77,163,255,0.08); }
  .s-pill.purple { color: var(--accent2); border-color: rgba(124,111,255,0.4); background: rgba(124,111,255,0.08); }
  .s-pill.green  { color: var(--green);   border-color: rgba(62,207,142,0.4);  background: rgba(62,207,142,0.08); }

  /* Cover gradient bg */
  .slide-cover {
    background:
      radial-gradient(ellipse at 20% 50%, rgba(77,163,255,0.12) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 30%, rgba(124,111,255,0.12) 0%, transparent 55%),
      var(--bg);
  }

  /* ── Bottombar ── */
  .bottombar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .nav-btn {
    background: #4da3ff;
    border: none;
    color: white;
    padding: 12px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 600;
    font-family: var(--font);
    transition: 0.2s;
  }
  .nav-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(77,163,255,0.3); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; transform: none; box-shadow: none; }

  .dots { display: flex; gap: 6px; align-items: center; }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    cursor: pointer;
    transition: all 0.3s;
    opacity: 0.5;
  }
  .dot.active { background: var(--accent); width: 18px; border-radius: 3px; opacity: 1; }

  /* ── Type A: hero — stark, full dark, huge text ── */
  .slide-a .s-h1 { font-size: 62px; line-height: 1.08; }

  /* ── Type B: structure — subtle glow + panel ── */
  .slide-b::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 110%, rgba(77,163,255,0.07) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }
  .slide-b > * { position: relative; z-index: 1; }

  .s-panel {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 24px 28px;
    width: 100%;
    max-width: 740px;
    margin-top: 8px;
  }

  /* ── Skyline decoration ── */
  .skyline-bg {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 200px;
    clip-path: polygon(
      0% 100%, 0% 58%, 4% 58%, 4% 35%, 8% 35%, 8% 58%,
      11% 58%, 11% 20%, 15% 20%, 15% 58%,
      19% 58%, 19% 42%, 23% 42%, 23% 58%,
      27% 58%, 27% 28%, 31% 28%, 31% 58%,
      34% 58%, 34% 48%, 38% 48%, 38% 58%,
      41% 58%, 41% 16%, 45% 16%, 45% 58%,
      49% 58%, 49% 36%, 53% 36%, 53% 58%,
      57% 58%, 57% 44%, 61% 44%, 61% 58%,
      65% 58%, 65% 24%, 69% 24%, 69% 58%,
      73% 58%, 73% 40%, 77% 40%, 77% 58%,
      81% 58%, 81% 32%, 85% 32%, 85% 58%,
      89% 58%, 89% 50%, 93% 50%, 93% 58%,
      97% 58%, 97% 45%, 100% 45%, 100% 100%
    );
    background: linear-gradient(to top, rgba(77,163,255,0.14), rgba(77,163,255,0.02));
    pointer-events: none;
    z-index: 0;
  }

  /* ── Flow icon steps ── */
  .flow-icon-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    background: #1f2937;
    padding: 14px 20px;
    border-radius: 14px;
    min-width: 100px;
    font-size: 0.88rem;
  }
  .flow-icon-step.highlight {
    color: #4da3ff;
    background: rgba(77,163,255,0.08);
    border: 1px solid rgba(77,163,255,0.3);
    text-shadow: 0 0 20px rgba(77,163,255,0.4);
  }
  .ficon { font-size: 1.5rem; line-height: 1; }

  /* ── Stats glow ── */
  .s-stat-val { position: relative; }
  .s-stat-val::before {
    content: '';
    position: absolute;
    inset: -14px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(77,163,255,0.13), transparent 70%);
    pointer-events: none;
  }

  /* ── Phone header (replaces status-bar) ── */
  .phone-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 6px 10px;
    font-size: 9px;
    font-weight: 700;
    opacity: 0.55;
  }
  .phone-notch {
    width: 40px; height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 4px;
  }

  /* ── QR code ── */
  .qr-block { margin-top: 28px; text-align: center; }
  .qr-wrap {
    display: inline-block;
    padding: 10px;
    background: white;
    border-radius: 14px;
    box-shadow: 0 0 30px rgba(77,163,255,0.3);
  }
  .qr-wrap img { display: block; border-radius: 4px; }

  /* ── App Store note ── */
  .s-note {
    font-size: 0.8rem;
    color: var(--accent);
    background: rgba(77,163,255,0.06);
    border: 1px solid rgba(77,163,255,0.2);
    border-radius: 50px;
    padding: 5px 18px;
    display: inline-block;
    margin-bottom: 20px;
    opacity: 0.85;
  }

  /* ── Product Model (Core + Premium) ── */
  .pricing-grid {
    display: grid; grid-template-columns: 1fr 40px 1fr; gap: 0;
    align-items: center; width: 100%; max-width: 560px; margin: 28px auto 0;
  }
  .pricing-card {
    background: var(--card); border-radius: 18px; padding: 26px 22px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .pricing-card h2 { font-size: 1rem; font-weight: 800; letter-spacing: 0.03em; margin-bottom: 4px; }
  .pricing-card.core { border: 1px solid rgba(77,163,255,0.25); }
  .pricing-card.premium { border: 1px solid rgba(124,111,255,0.45); background: rgba(124,111,255,0.08); }
  .pricing-card.premium h2 { color: var(--accent); }
  .pricing-card.core h2 { color: var(--accent2); }
  .pricing-feature {
    font-size: 0.82rem; color: var(--muted);
    padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .pricing-feature:last-of-type { border-bottom: none; }
  .pricing-label {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    margin-top: 10px; padding: 5px 14px; border-radius: 50px; text-align: center;
    background: rgba(77,163,255,0.1); color: var(--accent2);
  }
  .pricing-label.revenue { background: rgba(124,111,255,0.15); color: var(--accent); }
  .pricing-arrow {
    font-size: 1.4rem; color: var(--accent); text-align: center; opacity: 0.6;
  }

  /* ── Utilities ── */
  .highlight { color: #4da3ff; text-shadow: 0 0 20px rgba(77,163,255,0.4); }
  .micro { margin-top: 20px; font-size: 14px; opacity: 0.4; }

  .flow {
    display: flex;
    gap: 16px;
    margin-top: 30px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .flow div {
    background: #1f2937;
    padding: 12px 18px;
    border-radius: 12px;
    font-size: 0.9rem;
  }
  .flow span {
    opacity: 0.5;
    font-size: 24px;
    line-height: 1;
  }
  .flow-vertical {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin: 20px 0;
  }
  .flow-step {
    background: #1f2937;
    padding: 11px 32px;
    border-radius: 12px;
    font-size: 1rem;
  }
  .flow-arrow { opacity: 0.4; font-size: 20px; line-height: 1; }
  .flow-revenue {
    color: #4da3ff;
    font-size: 1.3rem;
    font-weight: 700;
    text-shadow: 0 0 20px rgba(77,163,255,0.5);
    background: rgba(77,163,255,0.08);
    border: 1px solid rgba(77,163,255,0.3);
    padding: 14px 40px;
  }

  .phone {
    width: 260px;
    height: 520px;
    border-radius: 40px;
    background: linear-gradient(145deg, #020617, #0f172a);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 0 80px rgba(77,163,255,0.25);
    position: relative;
    overflow: hidden;
    margin-top: 24px;
    flex-shrink: 0;
    transform: rotate(-2deg);
  }
  .screen { padding: 20px; }
  .status-bar {
    height: 6px;
    width: 60px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    margin: 0 auto 10px;
  }
  .app-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    font-size: 14px;
    opacity: 0.8;
  }
  .dot {
    width: 8px;
    height: 8px;
    background: #4da3ff;
    border-radius: 50%;
  }
  .app-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .app-card {
    background: rgba(255,255,255,0.05);
    border-radius: 14px;
    padding: 14px;
    text-align: left;
    font-size: 13px;
    transition: 0.2s;
    cursor: default;
    backdrop-filter: blur(6px);
  }
  .app-card:hover { transform: translateY(-2px); }
  .icon {
    width: 24px;
    height: 24px;
    margin-bottom: 6px;
    border-radius: 6px;
  }
  .door   { background: #4da3ff; }
  .camera { background: #22c55e; }
  .guest  { background: #f59e0b; }
  .key    { background: #a78bfa; }
  .activity { margin-top: 14px; }
  .activity-item { font-size: 12px; opacity: 0.6; padding: 4px 0; }

  /* Cards centered */
  .s-cards { justify-content: center; }
  .s-card  { text-align: left; }
  .s-stats { justify-content: center; }
  .s-pills { justify-content: center; }
</style>
</head>

/* ──────────────────────────────
   RENDER ENGINE
────────────────────────────── */
let current = 0;
let slides = [];

function buildSlideHTML(s) {
  if (s.raw) return s.raw;

  let top = '';
  let panel = '';

  if (!s.simple && s.tag) top += `<div class="s-tag">${s.tag}</div>`;
  if (s.title) top += `<h1 class="s-h1">${s.title}</h1>`;
  if (s.body)  top += `<p class="s-body">${s.body}</p>`;
  if (s.note)  top += `<div class="s-note">${s.note}</div>`;

  if (s.stats) {
    panel += `<div class="s-stats">` +
      s.stats.map(st => `<div><div class="s-stat-val">${st.val}</div><div class="s-stat-lbl">${st.lbl}</div></div>`).join('') +
      `</div>`;
  }

  if (s.cards) {
    panel += `<div class="s-cards">` +
      s.cards.map(c => `
        <div class="s-card">
          <div class="s-card-icon">${c.icon}</div>
          <div class="s-card-name">${c.name}</div>
          <div class="s-card-desc">${c.desc}</div>
        </div>`).join('') +
      `</div>`;
  }

  if (s.pills) {
    panel += `<div class="s-pills">` +
      s.pills.map(p => `<div class="s-pill ${p.cls}">${p.text}</div>`).join('') +
      `</div>`;
  }

  let result = top + (panel ? `<div class="s-panel">${panel}</div>` : '');
  if (s.qr) result += `<div class="qr-block"><div class="qr-wrap"><img src="${s.qr}" width="120" height="120" alt="QR"></div></div>`;
  return result;
}

function renderSlides() {
  const seg  = document.getElementById('segment').value;
  const lang = document.getElementById('lang').value;
  const data = content[seg][lang];
  const vp   = document.getElementById('slides-viewport');

  vp.innerHTML = '';
  slides = [];

  data.forEach((s, i) => {
    const isHero = s.raw || (!s.cards && !s.stats && !s.pills);
    const typeClass = isHero ? 'slide-a' : 'slide-b';
    const div = document.createElement('div');
    div.className = 'slide ' + typeClass + (i === 0 ? ' active slide-cover' : '');
    div.innerHTML = buildSlideHTML(s);
    vp.appendChild(div);
    slides.push(div);
  });

  current = 0;
  updateUI();
}

function goTo(idx) {
  if (idx < 0 || idx >= slides.length) return;
  slides.forEach(s => s.classList.remove('active'));
  current = idx;
  setTimeout(() => {
    slides[current].classList.add('active');
    updateUI();
  }, 50);
  updateUI();
}

function go(dir) { goTo(current + dir); }

function updateUI() {
  const total = slides.length;
  document.getElementById('slide-counter').textContent = `${current + 1} / ${total}`;
  document.getElementById('progress-bar').style.width = `${(current + 1) / total * 100}%`;
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === total - 1;

  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === current ? ' active' : '');
    d.onclick = () => goTo(i);
    dotsEl.appendChild(d);
  });
}

document.getElementById('segment').addEventListener('change', renderSlides);
document.getElementById('lang').addEventListener('change', renderSlides);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(-1);
});

renderSlides();
</script>
