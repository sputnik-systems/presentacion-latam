<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Evimiz GEO Platform Demo</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:      #0b0f14;
    --surface: #11161d;
    --card:    #161d27;
    --border:  rgba(77,163,255,0.15);
    --accent:  #4da3ff;
    --accent2: #7C6FFF;
    --green:   #3ecf8e;
    --text:    #f1f5f9;
    --muted:   #7a8a9e;
    --font:    -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  html, body { height: 100%; }
  body {
    font-family: var(--font);
    background: radial-gradient(circle at 20% 20%, #1e293b, #020617);
    color: var(--text);
    height: 100vh; overflow: hidden;
    display: flex; flex-direction: column;
  }

  /* ── Topbar ── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    flex-shrink: 0; gap: 16px;
  }
  .logo { font-size: 1rem; font-weight: 800; letter-spacing: -0.5px; flex-shrink: 0; white-space: nowrap; }
  .logo span { color: var(--accent); }

  /* ── Slide Name Nav ── */
  .slide-nav {
    display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none;
    flex: 1; justify-content: center; padding: 0 8px;
  }
  .slide-nav::-webkit-scrollbar { display: none; }
  .slide-nav-item {
    font-size: 0.71rem; font-weight: 600; padding: 5px 14px; border-radius: 50px;
    white-space: nowrap; color: var(--muted); cursor: pointer;
    transition: all 0.2s; border: 1px solid transparent; letter-spacing: 0.02em;
  }
  .slide-nav-item:hover { color: var(--text); }
  .slide-nav-item.active { color: var(--accent); background: rgba(77,163,255,0.1); border-color: rgba(77,163,255,0.3); }

  /* ── Lang toggle ── */
  .lang-toggle { display: flex; gap: 6px; flex-shrink: 0; }
  .lang-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted); font-size: 0.75rem; font-weight: 700;
    letter-spacing: 0.08em; padding: 5px 12px; border-radius: 50px;
    cursor: pointer; transition: all 0.2s; font-family: var(--font);
  }
  .lang-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Slides ── */
  #slides-viewport {
    flex: 1; position: relative; overflow: hidden;
    display: flex; justify-content: center;
  }
  .slide {
    position: absolute; top: 0; bottom: 0; left: 50%;
    transform: translateX(-50%) translateY(20px);
    width: 100%; max-width: 1200px;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center; text-align: center;
    padding: 40px 56px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.45s ease, transform 0.45s ease; z-index: 0;
  }
  .slide.active { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: all; z-index: 1; }

  /* ── Text elements ── */
  .s-tag {
    display: inline-block; font-size: 0.68rem; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent);
    border: 1px solid rgba(77,163,255,0.35); background: rgba(77,163,255,0.08);
    padding: 5px 16px; border-radius: 50px; margin-bottom: 18px;
  }
  .s-h1 { font-size: 48px; font-weight: 700; line-height: 1.18; letter-spacing: -0.02em; margin-bottom: 14px; }
  .s-h1 .hl {
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .highlight { color: var(--accent); text-shadow: 0 0 20px rgba(77,163,255,0.4); }
  .s-body { font-size: 17px; opacity: 0.65; line-height: 1.7; max-width: 560px; margin-bottom: 24px; }
  .micro { margin-top: 16px; font-size: 13px; opacity: 0.35; }
  .demo-tagline { margin-top: 18px; font-size: 0.82rem; color: var(--accent); font-style: italic; opacity: 0.8; }

  /* ── Split layout ── */
  .demo-split {
    display: flex; align-items: center; gap: 36px;
    width: 100%;
  }
  .demo-text { flex: 0 0 36%; text-align: left; }
  .demo-text .s-h1 { font-size: 32px; margin-bottom: 10px; }
  .demo-text .s-body { font-size: 15px; margin-bottom: 0; max-width: 100%; }

  /* ── Feature list ── */
  .demo-features { display: flex; flex-direction: column; gap: 12px; margin-top: 22px; }
  .demo-feature { display: flex; align-items: center; gap: 12px; }
  .demo-feature-icon {
    font-size: 1.2rem; width: 38px; height: 38px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .demo-feature-name { font-size: 0.88rem; font-weight: 700; }
  .demo-feature-desc { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

  /* ── Browser / dashboard frame ── */
  .browser-wrap {
    flex: 1; min-width: 0;
    border-radius: 14px; overflow: hidden;
    background: #0d1117;
    border: 1px solid rgba(77,163,255,0.18);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.04),
                0 0 60px rgba(77,163,255,0.15),
                0 28px 70px rgba(0,0,0,0.55);
  }
  .browser-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 14px; background: #161d27;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .bdot { width: 10px; height: 10px; border-radius: 50%; }
  .bdot.r { background: #ff5f57; }
  .bdot.y { background: #febc2e; }
  .bdot.g { background: #28c840; }
  .burl {
    flex: 1; height: 20px; margin: 0 8px;
    background: rgba(255,255,255,0.04); border-radius: 5px;
  }
  .browser-wrap img {
    width: 100%; display: block;
    height: 420px; object-fit: cover; object-position: top;
  }

  /* ── Pills ── */
  .s-pills { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 24px; justify-content: center; }
  .s-pill { font-size: 0.8rem; font-weight: 600; padding: 6px 16px; border-radius: 50px; border: 1px solid; }
  .s-pill.blue   { color: var(--accent);  border-color: rgba(77,163,255,0.4);  background: rgba(77,163,255,0.08); }
  .s-pill.purple { color: var(--accent2); border-color: rgba(124,111,255,0.4); background: rgba(124,111,255,0.08); }
  .s-pill.green  { color: var(--green);   border-color: rgba(62,207,142,0.4);  background: rgba(62,207,142,0.08); }

  /* ── Key message (Closing) ── */
  .key-contrast { display: flex; flex-direction: column; gap: 0; max-width: 700px; text-align: center; }
  .key-line { font-size: 46px; font-weight: 800; line-height: 1.15; letter-spacing: -0.02em; }
  .key-line.dim { opacity: 0.28; }
  .key-line.bright { color: var(--accent); text-shadow: 0 0 40px rgba(77,163,255,0.35); }
  .key-divider { width: 60px; height: 2px; background: linear-gradient(90deg,var(--accent2),var(--accent)); border-radius: 2px; margin: 20px auto; opacity: 0.5; }

  /* ── Bottombar ── */
  .bottombar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .nav-btn {
    background: var(--accent); border: none; color: white;
    padding: 11px 18px; border-radius: 10px; cursor: pointer;
    font-size: 1rem; font-weight: 600; font-family: var(--font); transition: 0.2s;
  }
  .nav-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(77,163,255,0.3); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; transform: none; box-shadow: none; }
  .dots { display: flex; gap: 6px; align-items: center; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); cursor: pointer; transition: all 0.3s; opacity: 0.45; }
  .dot.active { background: var(--accent); width: 20px; border-radius: 3px; opacity: 1; }
</style>
</head>

/* ── Engine ── */
let current = 0;
let lang = 'en';
let slides = [];

function renderSlides() {
  const data = content[lang];
  const vp = document.getElementById('slides-viewport');
  const nav = document.getElementById('slide-nav');
  vp.innerHTML = ''; nav.innerHTML = ''; slides = [];

  data.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');
    div.innerHTML = s.raw || '';
    vp.appendChild(div);
    slides.push(div);

    const navItem = document.createElement('div');
    navItem.className = 'slide-nav-item' + (i === 0 ? ' active' : '');
    navItem.textContent = s.name;
    navItem.onclick = () => goTo(i);
    nav.appendChild(navItem);
  });

  current = 0;
  updateUI();
}

function goTo(idx) {
  if (idx < 0 || idx >= slides.length) return;
  slides[current].classList.remove('active');
  current = idx;
  slides[current].classList.add('active');
  updateUI();
}
function go(dir) { goTo(current + dir); }

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.textContent === l.toUpperCase())
  );
  renderSlides();
}

function updateUI() {
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === slides.length - 1;
  document.querySelectorAll('.slide-nav-item').forEach((el, i) =>
    el.classList.toggle('active', i === current)
  );
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === current ? ' active' : '');
    d.onclick = () => goTo(i);
    dotsEl.appendChild(d);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(-1);
});

renderSlides();
</script>
